<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ============================================= -->
  <!-- PAGE TITLE — change your coin name here       -->
  <!-- ============================================= -->
  <title>SKITTLE MAN — Taste the Rainbow. Chase the Candle.</title>

  <meta name="description" content="$SKIT — a meme coin. No promises. No roadmap. Just sugar rush." />

  <!-- Premium fonts: Fredoka (display) + Outfit (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===================================================== -->
  <!-- FLOATING CANDIES — generated by script.js             -->
  <!-- (this empty layer just holds them)                    -->
  <!-- ===================================================== -->
  <div id="candy-layer" class="candy-layer" aria-hidden="true"></div>

  <!-- ===================================================== -->
  <!-- HERO SECTION (the only section)                       -->
  <!-- ===================================================== -->
  <main class="hero">

    <!-- Glass card holds all the content for a premium look -->
    <section class="card">

      <!-- WARNING PILL (top) — edit this text freely -->
      <div class="warning-pill">
        <span class="pill-dot"></span>
        WARNING: MAY CAUSE EXTREME RAINBOW CANDLES
      </div>

      <!-- Main headline — change coin name here -->
      <h1 class="headline" data-text="SKITTLE MAN">SKITTLE MAN</h1>

      <!-- Subheadline -->
      <p class="subheadline">Taste the Rainbow. Chase the Candle.</p>

      <!-- ============================================= -->
      <!-- MAIN IMAGE                                      -->
      <!-- Put your image at: /assets/skittle-man.png     -->
      <!-- ============================================= -->
      <div class="image-wrap">
        <div class="image-glow"></div>
        <!-- Shows your real PNG; falls back to the placeholder SVG until you add it.
             Once assets/skittle-man.png exists, you can delete the onerror line. -->
        <img
          src="assets/skittle-man.png"
          alt="Skittle Man covered in candy"
          class="hero-image"
          onerror="this.onerror=null; this.src='assets/skittle-man-placeholder.svg';"
        />
      </div>

      <!-- Funny line under the image -->
      <p class="meme-copy">
        Born in the trenches. Coated in candy. Powered by pure rainbow degen energy.
      </p>

      <!-- ============================================= -->
      <!-- FEES NOTE — edit the % or name here            -->
      <!-- ============================================= -->
      <div class="fees-note">
        <span class="fees-emoji">🍬</span>
        <span><strong>30% of all fees</strong> go straight to Ansem</span>
      </div>

      <!-- ============================================= -->
      <!-- SUGAR LEVEL METER — just for fun               -->
      <!-- ============================================= -->
      <div class="sugar-meter">
        <div class="sugar-top">
          <span class="sugar-label">Sugar Level</span>
          <span class="sugar-value" id="sugar-percent">100%</span>
        </div>
        <div class="sugar-bar">
          <div class="sugar-fill" id="sugar-fill"></div>
        </div>
      </div>

      <!-- Disclaimer -->
      <p class="disclaimer">
        $SKIT is a meme coin. No promises. No roadmap. Just sugar rush.
      </p>

    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
